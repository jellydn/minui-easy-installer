#:schema https://www.schemastore.org/prek.json

[[repos]]
repo = "builtin"
hooks = [
    { id = "trailing-whitespace" },
    { id = "end-of-file-fixer" },
    { id = "check-added-large-files" },
    { id = "check-yaml" },
    { id = "check-json" },
    { id = "mixed-line-ending", args = ["--fix=lf"] },
    { id = "check-merge-conflict" },
    { id = "check-case-conflict" },
]

# bun lint & typecheck
[[repos]]
repo = "local"
hooks = [
    { id = "bun-lint", name = "eslint", entry = "bun run lint -- --fix", language = "system", files = "\\.(ts|tsx)$", pass_filenames = false },
    { id = "bun-typecheck", name = "typecheck", entry = "bun run typecheck", language = "system", files = "\\.(ts|tsx)$", pass_filenames = false },
]
