<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc"/>
      <stop offset="100%" style="stop-color:#e2e8f0"/>
    </linearGradient>
    <linearGradient id="screen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="arrow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bg)"/>

  <!-- Subtle inner glow -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bg)" opacity="0.5"/>
  <rect x="16" y="16" width="480" height="240" rx="96" ry="96" fill="white" opacity="0.06"/>

  <!-- SD Card group -->
  <g filter="url(#shadow)">
    <!-- Card body -->
    <rect x="152" y="112" width="208" height="288" rx="20" ry="20" fill="url(#card)"/>

    <!-- Card top notch -->
    <rect x="172" y="112" width="64" height="36" rx="6" ry="6" fill="#cbd5e1"/>

    <!-- Card bottom pins -->
    <rect x="172" y="358" width="168" height="18" rx="6" ry="6" fill="#94a3b8"/>
    <line x1="192" y1="358" x2="192" y2="376" stroke="#64748b" stroke-width="2"/>
    <line x1="216" y1="358" x2="216" y2="376" stroke="#64748b" stroke-width="2"/>
    <line x1="240" y1="358" x2="240" y2="376" stroke="#64748b" stroke-width="2"/>
    <line x1="264" y1="358" x2="264" y2="376" stroke="#64748b" stroke-width="2"/>
    <line x1="288" y1="358" x2="288" y2="376" stroke="#64748b" stroke-width="2"/>
    <line x1="312" y1="358" x2="312" y2="376" stroke="#64748b" stroke-width="2"/>

    <!-- Screen on card -->
    <rect x="180" y="172" width="152" height="96" rx="10" ry="10" fill="url(#screen)"/>

    <!-- Screen content: simplified game UI -->
    <text x="256" y="210" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="bold" fill="#22d3ee" text-anchor="middle">MinUI</text>
    <rect x="208" y="223" width="96" height="3" rx="1.5" fill="#22d3ee" opacity="0.5"/>
    <rect x="216" y="233" width="80" height="3" rx="1.5" fill="#22d3ee" opacity="0.3"/>
    <rect x="224" y="243" width="64" height="3" rx="1.5" fill="#22d3ee" opacity="0.2"/>

    <!-- Install arrow circle -->
    <circle cx="256" cy="320" r="30" fill="url(#arrow)"/>

    <!-- Download/install arrow -->
    <path d="M256,308 L256,330 M248,322 L256,332 L264,322" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <line x1="246" y1="308" x2="266" y2="308" stroke="white" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- Sparkles / decorative -->
  <circle cx="138" cy="152" r="6" fill="#fbbf24" opacity="0.9"/>
  <circle cx="378" cy="148" r="5" fill="#fbbf24" opacity="0.8"/>
  <circle cx="146" cy="368" r="4" fill="#fbbf24" opacity="0.7"/>
  <circle cx="380" cy="356" r="5" fill="#fbbf24" opacity="0.8"/>
</svg>
