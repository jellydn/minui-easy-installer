<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc"/>
      <stop offset="100%" style="stop-color:#e2e8f0"/>
    </linearGradient>
    <linearGradient id="screen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bg)"/>

  <!-- SD Card body -->
  <rect x="156" y="100" width="200" height="280" rx="20" ry="20" fill="url(#card)" transform="rotate(-5, 256, 240)"/>

  <!-- SD Card notch -->
  <rect x="176" y="100" width="60" height="40" rx="5" ry="5" fill="#cbd5e1" transform="rotate(-5, 256, 240)"/>

  <!-- SD Card pins -->
  <rect x="196" y="340" width="120" height="20" rx="4" ry="4" fill="#94a3b8" transform="rotate(-5, 256, 240)"/>
  <line x1="216" y1="340" x2="216" y2="360" stroke="#64748b" stroke-width="2" transform="rotate(-5, 256, 240)"/>
  <line x1="236" y1="340" x2="236" y2="360" stroke="#64748b" stroke-width="2" transform="rotate(-5, 256, 240)"/>
  <line x1="256" y1="340" x2="256" y2="360" stroke="#64748b" stroke-width="2" transform="rotate(-5, 256, 240)"/>
  <line x1="276" y1="340" x2="276" y2="360" stroke="#64748b" stroke-width="2" transform="rotate(-5, 256, 240)"/>
  <line x1="296" y1="340" x2="296" y2="360" stroke="#64748b" stroke-width="2" transform="rotate(-5, 256, 240)"/>

  <!-- Screen on card -->
  <rect x="186" y="160" width="140" height="100" rx="8" ry="8" fill="url(#screen)" transform="rotate(-5, 256, 240)"/>

  <!-- MinUI text on screen -->
  <text x="256" y="215" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="bold" fill="#22d3ee" text-anchor="middle" transform="rotate(-5, 256, 240)">MinUI</text>

  <!-- Install arrow -->
  <g transform="translate(256, 310) rotate(-5)">
    <circle cx="0" cy="0" r="35" fill="#22c55e"/>
    <path d="M0,-18 L0,10 M-12,0 L0,12 L12,0" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <!-- Sparkles -->
  <circle cx="140" cy="140" r="6" fill="#fbbf24" opacity="0.9"/>
  <circle cx="380" cy="160" r="4" fill="#fbbf24" opacity="0.8"/>
  <circle cx="160" cy="350" r="5" fill="#fbbf24" opacity="0.7"/>
  <circle cx="370" cy="320" r="3" fill="#fbbf24" opacity="0.9"/>
</svg>
