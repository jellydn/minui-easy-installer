<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc"/>
      <stop offset="100%" style="stop-color:#e2e8f0"/>
    </linearGradient>
    <linearGradient id="screen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="arrow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#4f46e5" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bg)" filter="url(#shadow)"/>

  <!-- Subtle highlight -->
  <circle cx="256" cy="256" r="240" fill="white" opacity="0.04"/>
  <ellipse cx="256" cy="170" rx="200" ry="120" fill="white" opacity="0.06"/>

  <!-- SD Card body -->
  <rect x="140" y="108" width="232" height="296" rx="24" ry="24" fill="url(#card)"/>

  <!-- SD Card notch -->
  <rect x="166" y="108" width="68" height="40" rx="8" ry="8" fill="#cbd5e1"/>

  <!-- SD Card pins -->
  <rect x="166" y="366" width="180" height="18" rx="6" ry="6" fill="#94a3b8"/>
  <line x1="186" y1="366" x2="186" y2="384" stroke="#64748b" stroke-width="2"/>
  <line x1="212" y1="366" x2="212" y2="384" stroke="#64748b" stroke-width="2"/>
  <line x1="238" y1="366" x2="238" y2="384" stroke="#64748b" stroke-width="2"/>
  <line x1="264" y1="366" x2="264" y2="384" stroke="#64748b" stroke-width="2"/>
  <line x1="290" y1="366" x2="290" y2="384" stroke="#64748b" stroke-width="2"/>
  <line x1="316" y1="366" x2="316" y2="384" stroke="#64748b" stroke-width="2"/>

  <!-- Screen on card -->
  <rect x="172" y="175" width="168" height="100" rx="12" ry="12" fill="url(#screen)"/>

  <!-- Screen content: MinUI game launcher -->
  <text x="256" y="213" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="bold" fill="#22d3ee" text-anchor="middle">MinUI</text>
  <rect x="200" y="226" width="112" height="3" rx="1.5" fill="#22d3ee" opacity="0.6"/>
  <rect x="212" y="236" width="88" height="3" rx="1.5" fill="#22d3ee" opacity="0.4"/>
  <rect x="224" y="246" width="64" height="3" rx="1.5" fill="#22d3ee" opacity="0.2"/>

  <!-- Install button / arrow -->
  <circle cx="256" cy="328" r="34" fill="url(#arrow)"/>
  <path d="M256,314 L256,340 M246,330 L256,342 L266,330" stroke="white" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <line x1="244" y1="314" x2="268" y2="314" stroke="white" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Sparkles -->
  <circle cx="120" cy="148" r="7" fill="#fbbf24" opacity="0.9"/>
  <circle cx="400" cy="148" r="6" fill="#fbbf24" opacity="0.8"/>
  <circle cx="130" cy="378" r="5" fill="#fbbf24" opacity="0.7"/>
  <circle cx="395" cy="368" r="5" fill="#fbbf24" opacity="0.8"/>
  <circle cx="360" cy="128" r="4" fill="#fbbf24" opacity="0.6"/>
</svg>
